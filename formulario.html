<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servicio de Atención al Cliente - ¡Está Rico!</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/6Rb9wxvW/logo.png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffffff 0%, #c5c5c5 50%, #bbbbbb 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.4);
            max-width: 600px;
            width: 100%;
            overflow: hidden;
        }
        .header {
            background: #3f1615;
            padding: 30px 20px;
            text-align: center;
        }
        .logo-overlay {
            width: 280px;
            height: auto;
            filter: drop-shadow(0 10px 25px rgba(0,0,0,0.6));
        }
        .form-content {
            padding: 40px;
        }
        .form-title {
            color: #4C1A1A;
            font-size: 1.95em;
            text-align: center;
            margin-bottom: 8px;
        }
        .form-subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 35px;
            font-size: 0.95em;
        }
        .form-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            color: #4C1A1A;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 0.95em;
        }
        .required {
            color: #c00;
        }
        input[type="text"],
        select,
        textarea {
            width: 100%;
            padding: 16px;
            border: 2px solid #E0E0E0;
            border-radius: 12px;
            font-size: 1.02em;
            background: white;
        }
        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #4C1A1A;
            box-shadow: 0 0 0 4px rgba(76, 26, 26, 0.15);
        }
        textarea {
            resize: vertical;
            min-height: 120px;
        }

        /* Contenedor para las dos listas desplegables en fila */
        .payment-row {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }
        .payment-row .form-group {
            flex: 1;
            margin-bottom: 0;
        }

        .contexto-maquina {
            margin: 8px 0 20px 0;
            padding: 14px;
            background: rgba(76, 26, 26, 0.08);
            border-left: 5px solid #4C1A1A;
            border-radius: 10px;
            font-weight: 600;
            color: #4C1A1A;
            font-size: 1em;
        }
        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #4C1A1A 0%, #672525 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.15em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(76, 26, 26, 0.4);
        }
        small {
            display: block;
            margin-top: 8px;
            color: #666;
            font-size: 0.85em;
        }

        /* Animación suave */
        .form-group.hidden {
            display: none;
        }
        .form-group.visible {
            display: block;
            animation: fadeIn 0.4s ease forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .payment-row {
                flex-direction: column;
                gap: 20px;
            }
            .form-content { padding: 25px 20px; }
            .logo-overlay { width: 220px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="https://i.ibb.co/6Rb9wxvW/logo.png" alt="¡Está Rico!" class="logo-overlay">
        </div>
        
        <div class="form-content">
            <h2 class="form-title">Servicio de Atención al Cliente</h2>
            <p class="form-subtitle">Completa el formulario y te contactaremos a la brevedad</p>

            <form id="formulario">
                <!-- Campos ocultos del QR -->
                <input type="hidden" id="nroMaquina" name="nroMaquina">
                <input type="hidden" id="tipoMaquina" name="tipoMaquina">
                <input type="hidden" id="cliente" name="cliente">
                <input type="hidden" id="sector" name="sector">
                <input type="hidden" id="modelo" name="modelo">
                <input type="hidden" id="sistPago" name="sistPago">
                <input type="hidden" id="obs" name="obs">

                <div class="form-group">
                    <label for="nombre">Ingresa tu Nombre <span class="required">*</span></label>
                    <input type="text" id="nombre" name="nombre" placeholder="Tu nombre..." required>
                </div>

                <!-- Fila con las dos listas desplegables -->
                <div class="payment-row">
                    <div class="form-group">
                        <label for="pagado">¿Ha realizado el pago? <span class="required">*</span></label>
                        <select id="pagado" name="pagado" required>
                            <option value="">Seleccione una opción</option>
                            <option value="Sí">✅ Sí</option>
                            <option value="No">❌ No</option>
                        </select>
                    </div>

                    <!-- Tipo de Pago (se muestra solo si elige "Sí") -->
                    <div class="form-group hidden" id="tipoPagoGroup">
                        <label for="tipoPago">Tipo de Pago Realizado <span class="required">*</span></label>
                        <select id="tipoPago" name="tipoPago">
                            <option value="">Seleccione una opción</option>
                            <option value="QR">📱 Código QR</option>
                            <option value="Efectivo">💵 Efectivo</option>
                            <option value="Post">🏦 Post (Terminal)</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="producto">Especifica el Producto <span class="required">*</span></label>
                    <input type="text" id="producto" name="producto" placeholder="Describa el producto que quiso Consumir..." required>
                </div>

                <div class="form-group">
                    <label for="canal">Ingresa el Numero de Canal</label>
                    <input type="text" id="canal" name="canal" placeholder="Si es Snakera escriba numero de canal del Producto">
                </div>

                <div class="form-group">
                    <label>Usted se Encuentra en:</label>
                    <div id="infoContexto" class="contexto-maquina">
                        Cargando información de la máquina...
                    </div>
                </div>

                <div class="form-group">
                    <label for="comentarios">Comente brevemente el inconveniente:</label>
                    <textarea id="comentarios" name="comentarios" 
                        placeholder="Agrega detalles del problema: Procedimiento realizado o que observó en la Máquina"
                        required></textarea>
                    <small>Incluí toda la información posible para agilizar la solución</small>
                </div>

                <button type="submit" class="submit-btn" id="btnEnviar">ENVIAR FORMULARIO</button>
            </form>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz-t96DOLHGyNgIYagbFkZUoRLHXDKDOYZsyD34VpCWWgHvTW6-Qii-ER49-I4pXFqOAw/exec';
        const WHATSAPP_NUMBER = '3515631347';

        let maquinas = [];

        function normalizar(texto) {
            return texto.toString().toLowerCase().trim()
                .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        }

        async function cargarMaquinas() {
            try {
                const res = await fetch(`${SCRIPT_URL}?accion=obtenerMaquinas`);
                const data = await res.json();
                if (data.success) maquinas = data.maquinas;
            } catch (e) {
                console.error("Error cargando máquinas", e);
            }
        }

        function buscarMaquina(nro, tipo) {
            const nroNorm = normalizar(nro);
            const tipoNorm = normalizar(tipo || 'Café');
            return maquinas.find(m => 
                normalizar(m.nro) === nroNorm && normalizar(m.tipo) === tipoNorm
            ) || maquinas.find(m => normalizar(m.nro) === nroNorm);
        }

        function actualizarContexto() {
            const cliente = document.getElementById('cliente').value;
            const sector = document.getElementById('sector').value;
            const modelo = document.getElementById('modelo').value;
            
            const texto = cliente || sector || modelo 
                ? `📍 ${cliente || '-'} • ${sector || '-'} • ${modelo || '-'}`
                : 'Información de máquina no disponible';
            
            document.getElementById('infoContexto').innerHTML = texto;
        }

        // Mostrar/Ocultar Tipo de Pago
        function toggleTipoPago() {
            const pagado = document.getElementById('pagado').value;
            const tipoPagoGroup = document.getElementById('tipoPagoGroup');
            const tipoPagoSelect = document.getElementById('tipoPago');

            if (pagado === 'Sí') {
                tipoPagoGroup.classList.remove('hidden');
                tipoPagoGroup.classList.add('visible');
                tipoPagoSelect.required = true;
            } else {
                tipoPagoGroup.classList.add('hidden');
                tipoPagoGroup.classList.remove('visible');
                tipoPagoSelect.required = false;
                tipoPagoSelect.value = '';
            }
        }

        // Inicialización
        window.addEventListener('DOMContentLoaded', async () => {
            await cargarMaquinas();

            const params = new URLSearchParams(window.location.search);
            const nroMaquina = params.get('nro');
            const tipoMaquina = params.get('tipo') || 'Café';

            if (nroMaquina) {
                document.getElementById('nroMaquina').value = nroMaquina;
                document.getElementById('tipoMaquina').value = tipoMaquina;

                const maquina = buscarMaquina(nroMaquina, tipoMaquina);
                if (maquina) {
                    document.getElementById('cliente').value = maquina.cliente || '';
                    document.getElementById('sector').value = maquina.sector || '';
                    document.getElementById('modelo').value = maquina.modelo || '';
                    document.getElementById('sistPago').value = maquina.sistPago || '';
                    document.getElementById('obs').value = maquina.obs || '';
                }
                actualizarContexto();
            }

            // Evento para mostrar/ocultar
            document.getElementById('pagado').addEventListener('change', toggleTipoPago);
            
            // Estado inicial
            toggleTipoPago();
        });

        // Envío del formulario
        document.getElementById('formulario').addEventListener('submit', (e) => {
            e.preventDefault();

            const datos = {
                nroMaquina: document.getElementById('nroMaquina').value,
                tipoMaquina: document.getElementById('tipoMaquina').value,
                cliente: document.getElementById('cliente').value,
                sector: document.getElementById('sector').value,
                modelo: document.getElementById('modelo').value,
                sistPago: document.getElementById('sistPago').value,
                obs: document.getElementById('obs').value,
                nombre: document.getElementById('nombre').value.trim(),
                pagado: document.getElementById('pagado').value,
                tipoPago: document.getElementById('tipoPago').value || '-',
                producto: document.getElementById('producto').value.trim(),
                canal: document.getElementById('canal').value.trim(),
                comentarios: document.getElementById('comentarios').value.trim()
            };

            const mensajeWhatsApp = 
                '🚨 *NUEVA ATENCIÓN AL CLIENTE*' + '%0A%0A' +
                '--- DATOS DE LA MÁQUINA ---' + '%0A' +
                '🔢 *N° Máquina:* ' + (datos.nroMaquina || '-') + '%0A' +
                '🏢 *Contratista:* ' + (datos.cliente || '-') + '%0A' +
                '📍 *Sector:* ' + (datos.sector || '-') + '%0A' +
                '⚙️ *Modelo:* ' + (datos.modelo || '-') + '%0A' +
                '💳 *Sistema Pago:* ' + (datos.sistPago || '-') + '%0A%0A' +
                '--- DATOS DEL USUARIO ---' + '%0A' +
                '👤 *Nombre:* ' + datos.nombre + '%0A' +
                '✅ *Pago realizado:* ' + datos.pagado + '%0A' +
                '💰 *Tipo de Pago:* ' + datos.tipoPago + '%0A' +
                '📦 *Producto:* ' + datos.producto + '%0A' +
                '📺 *Canal:* ' + (datos.canal || '-') + '%0A%0A' +
                '--- INCONVENIENTE ---' + '%0A' +
                datos.comentarios;

            const urlWhatsApp = `https://wa.me/${WHATSAPP_NUMBER}?text=${mensajeWhatsApp}`;

            window.location.href = urlWhatsApp;
        });
    </script>
</body>
</html>
